version: '3.8'

services:
  app:
    build: .
    container_name: codesync-app
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MONGODB_URI=mongodb://mongo:27017/collaborative_editor
      - JWT_SECRET=${JWT_SECRET:-change_this_secret_in_production_minimum_32_chars}
      - JWT_EXPIRES_IN=7d
      - NODE_ENV=production
      - FRONTEND_URL=http://localhost:3001
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - codesync-net

  mongo:
    image: mongo:6.0
    container_name: codesync-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    environment:
      - MONGO_INITDB_DATABASE=collaborative_editor
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - codesync-net

  # Optional: MongoDB admin UI
  mongo-express:
    image: mongo-express:latest
    container_name: codesync-mongo-express
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongo
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=admin123
    depends_on:
      - mongo
    restart: unless-stopped
    networks:
      - codesync-net
    profiles:
      - debug

volumes:
  mongo_data:
    driver: local

networks:
  codesync-net:
    driver: bridge
